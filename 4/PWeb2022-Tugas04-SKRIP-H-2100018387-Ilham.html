<!DOCTYPE html>
<html>
<head>
    <title>Tugas04</title>
</head>
<body>
    <div>
        <h3>BIODATA DIRI</h3>
        <p>Isilah Form di Bawah.</p>
        <p>
            <form>
                <p>
                    Nama 
                    <input type="text" name="nama" size="20" placeholder="Masukkan Nama">
                </p>
                <p>
                    NIM 
                    <input type="number" name="nim" size="10" placeholder="Masukkan NIM">
                </p>
                <p>
                    Prodi 
                    <select name="prodi" size="1">
                        <option value="1">
                            Informatika
                        </option>
                        <option value="2">
                            Teknik Kimia
                        </option>
                        <option value="3">
                            Teknik Industri
                        </option>
                        <option value="4">
                            Teknik Elektro
                        </option>
                        <option value="5">
                            Teknologi Pangan
                        </option>
                    </select>
                </p>
                <p>
                    kelas 
                    <select name="kelas" size="1">
                        <option value="1">A</option>
                        <option value="2">B</option>
                        <option value="3">C</option>
                        <option value="4">D</option>
                        <option value="5">E</option>
                        <option value="6">F</option>
                        <option value="7">G</option>
                        <option value="8">H</option>
                        <option value="9">I</option>
                        <option value="10">J</option>
                    </select>
                </p>
                <p>
                    Jenis Kelamin 
                    <input type="radio" name="kelamin">Laki-Laki
                    <input type="radio" name="kelamin">Perempuan
                </p>
                <p>
                    Alamat 
                    <textarea name="alamat" cols="30" rows="5" placeholder="Masukkan Alamat"></textarea>
                </p>
                <input type="submit" name="kirim" value="kirim">
                <input type="reset" name="bersih" value="bersihkan">
            </form>
        </p>
    </div>
</body>
</html>
